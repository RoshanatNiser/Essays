<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essay Library</title>

<!-- MARKDOWN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- SYNTAX HIGHLIGHT -->
<link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- MATHJAX -->
<script>
window.MathJax = {
    tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
    svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>

:root {
    --bg:     #121212;
    --card:   #1f1f1f;
    --text:   #ffffff;
    --accent: #4da6ff;
    --border: #333333;
}

.light {
    --bg:     #f5f5f5;
    --card:   #ffffff;
    --text:   #111111;
    --accent: #0066cc;
    --border: #cccccc;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* ── LAYOUT ── */
#app {
    display: flex;
    height: 100vh;
    width: 100%;
    overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.3s ease;
}

#sidebar.hidden {
    width: 0;
    border-right: none;
}

#sidebar-inner {
    width: 300px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    height: 100%;
}

#sidebar h2 {
    font-size: 1.2rem;
    white-space: nowrap;
}

/* ── SEARCH ── */
#search {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    outline: none;
    font-size: 0.95rem;
}

/* ── FILTER BUTTONS ── */
#filterContainer {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

/* Ghost pill — border only; fills solid when active */
.filter-btn {
    padding: 6px 13px;
    border-radius: 20px;
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, transform 0.1s;
    user-select: none;
}

.filter-btn:hover {
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    transform: translateY(-1px);
}

.filter-btn.active {
    background: var(--accent);
    color: #fff;
}

/* Clear All — muted, appears only when a filter is active */
#clearFilter {
    padding: 6px 13px;
    border-radius: 20px;
    background: transparent;
    color: #888;
    border: 1.5px solid #555;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    display: none;
}

#clearFilter:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border-color: #888;
}

/* ── FILE LIST ── */
#fileList {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.file-card {
    background: rgba(255,255,255,0.06);
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    font-size: 0.9rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.file-card:hover {
    transform: scale(1.02);
    background: rgba(255,255,255,0.12);
}

.file-card.active {
    background: var(--accent);
    color: #fff;
}

/* ── MAIN PANEL ── */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── TOPBAR ── */
#topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
    align-items: center;
}

#topbar button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
}

#topbar button:hover { opacity: 0.85; }

#downloadPDFBtn {
    display: none;
    margin-left: auto;
}

/* ── PROGRESS ── */
#progress-container {
    height: 3px;
    background: transparent;
    flex-shrink: 0;
}

#progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.1s linear;
}

/* ── CONTENT ── */
#content-wrap {
    flex: 1;
    overflow-y: auto;
}

#content {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 40px 80px;
    line-height: 1.8;
    font-size: 1rem;
}

/* ── MARKDOWN STYLES ── */
#content h1, #content h2, #content h3 {
    margin-top: 1.6em;
    margin-bottom: 0.4em;
    line-height: 1.3;
}
#content p    { margin-bottom: 1em; }
#content a    { color: var(--accent); }
#content pre  { padding: 16px; border-radius: 10px; overflow-x: auto; margin-bottom: 1em; }
#content code:not(pre code) {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
}
#content blockquote {
    border-left: 4px solid var(--accent);
    padding-left: 16px;
    color: #aaa;
    margin: 1em 0;
}
#content img   { max-width: 100%; border-radius: 6px; }
#content table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
#content th, #content td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
}
#content th { background: rgba(255,255,255,0.08); }

</style>
</head>

<body>
<div id="app">

    <!-- ── SIDEBAR ── -->
    <div id="sidebar">
        <div id="sidebar-inner">

            <h2>📚 Essay Library</h2>

            <input
                type="text"
                id="search"
                placeholder="Search essays…"
                autocomplete="off"
            >

            <div id="filterContainer"></div>

            <div id="fileList">
                <p style="opacity:0.5;font-size:0.85rem;">Loading…</p>
            </div>

        </div>
    </div>

    <!-- ── MAIN ── -->
    <div id="main">

        <div id="topbar">
            <button onclick="toggleSidebar()" title="Toggle sidebar">☰ Sidebar</button>
            <button onclick="toggleTheme()" title="Switch theme">🌗 Theme</button>
            <button id="downloadPDFBtn" title="Download PDF">⬇ PDF</button>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="content-wrap">
            <div id="content">
                <h1>Welcome</h1>
                <p>Select an essay from the sidebar to start reading.</p>
            </div>
        </div>

    </div>
</div>

<script>

/* =========================================
   CONFIG
========================================= */

const repoUser  = "RoshanatNiser";
const repoName  = "Essays";
const branch    = "main";
const folder    = "essays";
const pdfFolder = "pdfs";

/* =========================================
   GLOBALS
========================================= */

let markdownFiles = [];   /* all .md files from GitHub API */
let filters       = {};   /* { CategoryName: ["file1.md", ...] } */
let activeFilters = new Set();   /* currently toggled-on filter names */
let currentFile   = null;

/* =========================================
   BOOT
========================================= */

fetchMarkdownFiles();
fetchFilters();

/* =========================================
   FETCH MARKDOWN FILE LIST  (GitHub API)
========================================= */

async function fetchMarkdownFiles() {

    try {

        const url = `https://api.github.com/repos/${repoUser}/${repoName}/contents/${folder}`;
        const res = await fetch(url);

        if (!res.ok) throw new Error(`GitHub API ${res.status}`);

        const data = await res.json();

        markdownFiles = data.filter(f => f.name.endsWith(".md"));

        renderFileList(markdownFiles);

    } catch (err) {

        document.getElementById("fileList").innerHTML =
            `<p style="color:#f66;font-size:0.85rem;">Could not load essays.<br>${err.message}</p>`;
    }
}

/* =========================================
   FETCH FILTERS  (raw GitHub URL — works on GitHub Pages)
   Also normalises fancy/curly quotes to straight ones so
   filenames match what the GitHub API returns.
========================================= */

async function fetchFilters() {

    try {

        const url = `https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/filters.json`;
        const res = await fetch(url);

        if (!res.ok) return;

        const raw = await res.json();

        /* Normalise curly apostrophes/quotes that may be in filters.json
           but won't match the straight-quote filenames from the API */
        filters = {};
        for (const [category, files] of Object.entries(raw)) {
            filters[category] = files.map(f =>
                f.replace(/[\u2018\u2019\u02BC]/g, "'")   /* ' ' ʼ → ' */
                 .replace(/[\u201C\u201D]/g, '"')          /* " " → " */
            );
        }

        renderFilters();

    } catch {
        /* no filters.json — silently skip */
    }
}

/* =========================================
   RENDER FILTER BUTTONS
========================================= */

function renderFilters() {

    const container = document.getElementById("filterContainer");
    container.innerHTML = "";

    const names = Object.keys(filters);
    if (names.length === 0) return;

    names.forEach(name => {

        const btn = document.createElement("button");
        btn.className      = "filter-btn";
        btn.textContent    = name;
        btn.dataset.filter = name;
        btn.onclick        = () => toggleFilter(name);
        container.appendChild(btn);
    });

    const clear = document.createElement("button");
    clear.id          = "clearFilter";
    clear.textContent = "✕ Clear All";
    clear.onclick     = clearAllFilters;
    container.appendChild(clear);
}

/* =========================================
   TOGGLE A FILTER  (multi-select)
========================================= */

function toggleFilter(name) {

    if (activeFilters.has(name)) {
        activeFilters.delete(name);
    } else {
        activeFilters.add(name);
    }

    /* sync button highlight states */
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.toggle("active", activeFilters.has(btn.dataset.filter));
    });

    /* show Clear All only when at least one filter is on */
    document.getElementById("clearFilter").style.display =
        activeFilters.size > 0 ? "inline-block" : "none";

    applyFiltersAndSearch();
}

/* =========================================
   CLEAR ALL FILTERS
========================================= */

function clearAllFilters() {

    activeFilters.clear();

    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("clearFilter").style.display = "none";

    applyFiltersAndSearch();
}

/* =========================================
   APPLY FILTERS + SEARCH QUERY TOGETHER
   Union logic: a file is shown if it belongs
   to ANY of the active filters.
========================================= */

function applyFiltersAndSearch() {

    let pool;

    if (activeFilters.size === 0) {

        pool = markdownFiles;

    } else {

        /* build union of all filenames allowed by active filters */
        const allowed = new Set(
            [...activeFilters].flatMap(name => filters[name] || [])
        );

        pool = markdownFiles.filter(f => allowed.has(f.name));
    }

    /* further narrow by search query */
    const query = document.getElementById("search").value.toLowerCase().trim();
    const results = query
        ? pool.filter(f => f.name.toLowerCase().includes(query))
        : pool;

    renderFileList(results);
}

/* =========================================
   RENDER FILE LIST
========================================= */

function renderFileList(files) {

    const list = document.getElementById("fileList");
    list.innerHTML = "";

    if (files.length === 0) {
        list.innerHTML = `<p style="opacity:0.5;font-size:0.85rem;">No essays found.</p>`;
        return;
    }

    files.forEach(file => {

        const card = document.createElement("div");
        card.className   = "file-card";
        card.textContent = file.name.replace(/\.md$/, "");
        if (file.name === currentFile) card.classList.add("active");
        card.onclick = () => loadMarkdown(file.name);
        list.appendChild(card);
    });
}

/* =========================================
   LOAD MARKDOWN
========================================= */

async function loadMarkdown(filename) {

    currentFile = filename;

    /* highlight selected card */
    document.querySelectorAll(".file-card").forEach(c => {
        c.classList.toggle("active", c.textContent === filename.replace(/\.md$/, ""));
    });

    const url     = `https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/${folder}/${filename}`;
    const content = document.getElementById("content");

    content.innerHTML = `<p style="opacity:0.5;">Loading…</p>`;

    try {

        const res      = await fetch(url);
        const markdown = await res.text();

        content.innerHTML = marked.parse(markdown);

        content.querySelectorAll("pre code").forEach(block => {
            hljs.highlightElement(block);
        });

        MathJax.typesetPromise([content]).catch(console.error);

    } catch (err) {

        content.innerHTML = `<p style="color:#f66;">Failed to load essay.<br>${err.message}</p>`;
    }

    document.getElementById("content-wrap").scrollTop = 0;
    document.getElementById("progress-bar").style.width = "0%";

    checkPDFExists(filename);
}

/* =========================================
   CHECK IF PDF EXISTS
========================================= */

async function checkPDFExists(filename) {

    const pdfFile = filename.replace(/\.md$/, ".pdf");
    const pdfURL  = `https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/${pdfFolder}/${pdfFile}`;
    const btn     = document.getElementById("downloadPDFBtn");

    try {

        const res = await fetch(pdfURL, { method: "HEAD" });

        if (res.ok) {
            btn.style.display = "inline-block";
            btn.onclick = () => window.open(pdfURL, "_blank");
        } else {
            btn.style.display = "none";
        }

    } catch {

        btn.style.display = "none";
    }
}

/* =========================================
   SEARCH
========================================= */

document.getElementById("search").addEventListener("input", function () {
    applyFiltersAndSearch();
});

/* =========================================
   SIDEBAR TOGGLE
========================================= */

function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("hidden");
}

/* =========================================
   THEME TOGGLE
========================================= */

function toggleTheme() {
    document.body.classList.toggle("light");
}

/* =========================================
   READING PROGRESS BAR
========================================= */

document.getElementById("content-wrap").addEventListener("scroll", function () {
    const el      = this;
    const scrolled = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
    document.getElementById("progress-bar").style.width = scrolled + "%";
});

</script>
</body>
</html>
