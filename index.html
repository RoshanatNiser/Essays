<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Essay Library</title>

<!-- MARKDOWN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- SYNTAX HIGHLIGHT -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- MATHJAX -->
<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
    },
    svg: {
        fontCache: 'global'
    }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<!-- PDF EXPORT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

:root {
    --bg: #121212;
    --card: #1f1f1f;
    --text: #ffffff;
    --accent: #4da6ff;
}

.light {
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #111111;
    --accent: #0066cc;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* SIDEBAR */

#sidebar {
    width: 300px;
    background: var(--card);
    overflow-y: auto;
    padding: 20px;
    border-right: 1px solid #333;
}

#sidebar h2 {
    margin-top: 0;
}

#search {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    outline: none;
}

.tag {
    display: inline-block;
    background: var(--accent);
    padding: 5px 10px;
    border-radius: 15px;
    margin: 5px;
    cursor: pointer;
    font-size: 13px;
}

.file-card {
    background: rgba(255,255,255,0.05);
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.file-card:hover {
    transform: scale(1.02);
}

/* MAIN */

#main {
    flex: 1;
    overflow-y: auto;
    position: relative;
}

/* TOPBAR */

#topbar {
    position: sticky;
    top: 0;
    background: var(--card);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    z-index: 100;
    border-bottom: 1px solid #333;
}

button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

/* PROGRESS BAR */

#progress-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: transparent;
    z-index: 9999;
}

#progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
}

/* CONTENT */

#content {
    max-width: 1000px;
    margin: auto;
    padding: 40px;
    line-height: 1.8;
}

pre {
    padding: 15px;
    overflow-x: auto;
    border-radius: 10px;
}

/* COMMENTS */

#comments {
    margin-top: 50px;
    padding-top: 30px;
    border-top: 1px solid #444;
}

.comment {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}

textarea {
    width: 100%;
    height: 100px;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

</style>
</head>

<body>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<!-- SIDEBAR -->

<div id="sidebar">

    <h2>Essay Library</h2>

    <input type="text" id="search" placeholder="Search essays...">

    <div>
        <span class="tag" onclick="filterTag('physics')">Physics</span>
        <span class="tag" onclick="filterTag('ai')">AI</span>
        <span class="tag" onclick="filterTag('philosophy')">Philosophy</span>
        <span class="tag" onclick="filterTag('math')">Math</span>
    </div>

    <div id="fileList"></div>

</div>

<!-- MAIN -->

<div id="main">

    <div id="topbar">
        <button onclick="toggleTheme()">Theme</button>
        <button onclick="exportPDF()">Export PDF</button>
    </div>

    <div id="content">
        <h1>Welcome</h1>
        <p>Select an essay from the sidebar.</p>
    </div>

</div>

<script>

/* =========================================
   CONFIG
========================================= */

const repoUser = "YOUR_USERNAME";
const repoName = "YOUR_REPO";
const branch = "main";
const folder = "essays";

/* =========================================
   GLOBALS
========================================= */

let markdownFiles = [];

/* =========================================
   AUTO DETECT MARKDOWN FILES
========================================= */

async function fetchMarkdownFiles() {

    const apiURL =
`https://api.github.com/repos/${repoUser}/${repoName}/contents/${folder}`;

    const response = await fetch(apiURL);
    const data = await response.json();

    markdownFiles = data.filter(file =>
        file.name.endsWith(".md")
    );

    renderFileList(markdownFiles);
}

/* =========================================
   RENDER FILE LIST
========================================= */

function renderFileList(files) {

    const fileList = document.getElementById("fileList");

    fileList.innerHTML = "";

    files.forEach(file => {

        const div = document.createElement("div");

        div.className = "file-card";

        div.innerHTML = `
            <strong>${file.name.replace(".md","")}</strong>
        `;

        div.onclick = () => loadMarkdown(file.name);

        fileList.appendChild(div);
    });
}

/* =========================================
   LOAD MARKDOWN
========================================= */

async function loadMarkdown(filename) {

    const rawURL =
`https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/${folder}/${filename}`;

    const response = await fetch(rawURL);

    const markdown = await response.text();

    document.getElementById("content").innerHTML =
        marked.parse(markdown);

    hljs.highlightAll();

    MathJax.typeset();

    loadComments(filename);

    window.scrollTo(0,0);
}

/* =========================================
   SEARCH
========================================= */

document.getElementById("search")
.addEventListener("input", function() {

    const value = this.value.toLowerCase();

    const filtered = markdownFiles.filter(file =>
        file.name.toLowerCase().includes(value)
    );

    renderFileList(filtered);
});

/* =========================================
   TAG FILTER
========================================= */

function filterTag(tag) {

    const filtered = markdownFiles.filter(file =>
        file.name.toLowerCase().includes(tag)
    );

    renderFileList(filtered);
}

/* =========================================
   DARK / LIGHT
========================================= */

function toggleTheme() {

    document.body.classList.toggle("light");
}

/* =========================================
   PDF EXPORT
========================================= */

function exportPDF() {

    const element = document.getElementById("content");

    html2pdf().from(element).save();
}

/* =========================================
   READING PROGRESS BAR
========================================= */

window.addEventListener("scroll", () => {

    let winScroll =
        document.documentElement.scrollTop;

    let height =
        document.documentElement.scrollHeight -
        document.documentElement.clientHeight;

    let scrolled = (winScroll / height) * 100;

    document.getElementById("progress-bar")
        .style.width = scrolled + "%";
});

/* =========================================
   COMMENTS
========================================= */

function loadComments(filename) {

    const content = document.getElementById("content");

    let commentsHTML = `
        <div id="comments">
            <h2>Comments</h2>

            <textarea id="commentInput"
            placeholder="Write a comment..."></textarea>

            <button onclick="saveComment('${filename}')">
                Post Comment
            </button>

            <div id="commentList"></div>
        </div>
    `;

    content.innerHTML += commentsHTML;

    const comments =
        JSON.parse(localStorage.getItem(filename) || "[]");

    const commentList =
        document.getElementById("commentList");

    comments.forEach(c => {

        commentList.innerHTML += `
            <div class="comment">${c}</div>
        `;
    });
}

function saveComment(filename) {

    const input =
        document.getElementById("commentInput");

    const comments =
        JSON.parse(localStorage.getItem(filename) || "[]");

    comments.push(input.value);

    localStorage.setItem(
        filename,
        JSON.stringify(comments)
    );

    loadMarkdown(filename);
}

/* =========================================
   START
========================================= */

fetchMarkdownFiles();

</script>

</body>
</html>
