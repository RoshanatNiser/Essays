<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Essay Library</title>

<!-- MARKDOWN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- HIGHLIGHT -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- MATHJAX -->
<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
    }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>

:root {

    --bg: #121212;
    --card: #1f1f1f;
    --text: #ffffff;
    --accent: #4da6ff;
}

.light {

    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #111111;
    --accent: #0066cc;
}

* {

    box-sizing: border-box;
}

html,
body {

    margin: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    font-family: Arial, sans-serif;

    background: var(--bg);

    color: var(--text);
}

/* LAYOUT */

#app {

    display: flex;

    width: 100%;
    height: 100%;
}

/* SIDEBAR */

#sidebar {

    width: 320px;

    background: var(--card);

    overflow-y: auto;

    border-right: 1px solid #333;

    padding: 20px;

    flex-shrink: 0;

    transition:
        width 0.3s ease,
        padding 0.3s ease,
        opacity 0.3s ease;
}

#sidebar.hidden {

    width: 0;

    padding: 0;

    opacity: 0;

    overflow: hidden;

    border-right: none;
}

/* MAIN */

#main {

    flex: 1;

    display: flex;

    flex-direction: column;

    overflow: hidden;

    transition: all 0.3s ease;
}

/* TOPBAR */

#topbar {

    background: var(--card);

    padding: 12px;

    display: flex;

    gap: 10px;

    border-bottom: 1px solid #333;

    flex-shrink: 0;
}

/* CONTENT */

#content {

    flex: 1;

    overflow-y: auto;

    padding: 40px;

    line-height: 1.8;

    max-width: 1000px;

    width: 100%;

    margin: auto;
}

/* SEARCH */

#search {

    width: 100%;

    padding: 10px;

    margin-bottom: 15px;

    border-radius: 8px;

    border: none;
}

/* BUTTON */

button {

    background: var(--accent);

    color: white;

    border: none;

    padding: 10px 15px;

    border-radius: 8px;

    cursor: pointer;
}

/* FILE CARD */

.file-card {

    background: rgba(255,255,255,0.05);

    padding: 12px;

    margin-top: 12px;

    border-radius: 10px;

    cursor: pointer;

    transition: 0.2s;
}

.file-card:hover {

    transform: scale(1.02);
}

/* FILTERS */

#filterContainer {

    margin-bottom: 20px;
}

.filter-btn {

    display: inline-block;

    margin: 5px;

    padding: 8px 12px;

    border-radius: 8px;

    background: var(--accent);

    color: white;

    border: none;

    cursor: pointer;
}

/* PDF BUTTON */

#downloadPDFBtn {

    display: none;
}

/* CODE */

pre {

    padding: 15px;

    border-radius: 10px;

    overflow-x: auto;
}

/* IMAGES */

img {

    max-width: 100%;
}

/* PROGRESS */

#progress-container {

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;

    height: 4px;

    z-index: 9999;
}

#progress-bar {

    height: 100%;

    width: 0%;

    background: var(--accent);
}

</style>

</head>

<body>

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="app">

    <!-- SIDEBAR -->

    <div id="sidebar">

        <h2>Essay Library</h2>

        <input
            type="text"
            id="search"
            placeholder="Search essays..."
        >

        <div id="filterContainer"></div>

        <div id="fileList"></div>

    </div>

    <!-- MAIN -->

    <div id="main">

        <div id="topbar">

            <button onclick="toggleSidebar()">
                ☰ Sidebar
            </button>

            <button onclick="toggleTheme()">
                Toggle Theme
            </button>

            <button id="downloadPDFBtn">
                Download PDF
            </button>

        </div>

        <div id="content">

            <h1>Welcome</h1>

            <p>Select an essay from the sidebar.</p>

        </div>

    </div>

</div>

<script>

/* CONFIG */

const repoUser = "RoshanatNiser";

const repoName = "Essays";

const branch = "main";

const folder = "essays";

const pdfFolder = "pdfs";

/* GLOBALS */

let markdownFiles = [];

let filters = {};

let currentFilter = null;

/* FETCH MARKDOWN */

async function fetchMarkdownFiles() {

    const apiURL =
`https://api.github.com/repos/${repoUser}/${repoName}/contents/${folder}`;

    const response = await fetch(apiURL);

    const data = await response.json();

    markdownFiles = data.filter(file =>
        file.name.endsWith(".md")
    );

    renderFileList(markdownFiles);
}

/* FETCH FILTERS */

async function fetchFilters() {

    try {

        const response =
            await fetch("filters.json");

        filters = await response.json();

        renderFilters();

    } catch(error) {

        console.log("No filters found");
    }
}

/* RENDER FILTERS */

function renderFilters() {

    const container =
        document.getElementById("filterContainer");

    container.innerHTML = "";

    const filterNames =
        Object.keys(filters);

    filterNames.forEach(filterName => {

        const button =
            document.createElement("button");

        button.className = "filter-btn";

        button.innerText = filterName;

        button.onclick = () =>
            applyFilter(filterName);

        container.appendChild(button);
    });
}

/* APPLY FILTER */

function applyFilter(filterName) {

    currentFilter = filterName;

    const allowedFiles =
        filters[filterName];

    const filtered =
        markdownFiles.filter(file =>
            allowedFiles.includes(file.name)
        );

    renderFileList(filtered);
}

/* RENDER FILE LIST */

function renderFileList(files) {

    const fileList =
        document.getElementById("fileList");

    fileList.innerHTML = "";

    files.forEach(file => {

        const div =
            document.createElement("div");

        div.className = "file-card";

        div.innerHTML =
            `<strong>${file.name.replace(".md","")}</strong>`;

        div.onclick = () =>
            loadMarkdown(file.name);

        fileList.appendChild(div);
    });
}

/* LOAD MARKDOWN */

async function loadMarkdown(filename) {

    const rawURL =
`https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/${folder}/${filename}`;

    const response = await fetch(rawURL);

    const markdown = await response.text();

    document.getElementById("content").innerHTML =
        marked.parse(markdown);

    hljs.highlightAll();

    MathJax.typeset();

    checkPDFExists(filename);

    document.getElementById("content")
        .scrollTo(0,0);
}

/* CHECK PDF */

async function checkPDFExists(filename) {

    const pdfFile =
        filename.replace(".md",".pdf");

    const pdfURL =
`https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/${pdfFolder}/${pdfFile}`;

    try {

        const response =
            await fetch(pdfURL, {
                method: "HEAD"
            });

        const button =
            document.getElementById("downloadPDFBtn");

        if(response.ok) {

            button.style.display = "inline-block";

            button.onclick = () => {

                window.open(pdfURL, "_blank");
            };

        } else {

            button.style.display = "none";
        }

    } catch {

        document.getElementById("downloadPDFBtn")
            .style.display = "none";
    }
}

/* SEARCH */

document.getElementById("search")
.addEventListener("input", function() {

    const value =
        this.value.toLowerCase();

    let files =
        markdownFiles;

    if(currentFilter) {

        const allowed =
            filters[currentFilter];

        files =
            markdownFiles.filter(file =>
                allowed.includes(file.name)
            );
    }

    const filtered =
        files.filter(file =>
            file.name.toLowerCase().includes(value)
        );

    renderFileList(filtered);
});

/* TOGGLE SIDEBAR */

function toggleSidebar() {

    document.getElementById("sidebar")
        .classList.toggle("hidden");
}

/* THEME */

function toggleTheme() {

    document.body.classList.toggle("light");
}

/* PROGRESS BAR */

document.getElementById("content")
.addEventListener("scroll", () => {

    let content =
        document.getElementById("content");

    let scrolled =
        (content.scrollTop /
        (content.scrollHeight - content.clientHeight))
        * 100;

    document.getElementById("progress-bar")
        .style.width = scrolled + "%";
});

/* START */

fetchMarkdownFiles();

fetchFilters();

</script>

</body>

</html>
