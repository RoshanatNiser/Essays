<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Essay Library</title>

<!-- MARKDOWN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- SYNTAX HIGHLIGHT -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<!-- MATHJAX -->
<script>
window.MathJax = {
    tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
    },
    svg: {
        fontCache: 'global'
    }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>

:root {

    --bg: #121212;
    --card: #1f1f1f;
    --text: #ffffff;
    --accent: #4da6ff;
}

.light {

    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #111111;
    --accent: #0066cc;
}

* {

    box-sizing: border-box;
}

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: var(--bg);

    color: var(--text);

    display: flex;

    height: 100vh;

    overflow: hidden;
}

/* SIDEBAR */

#sidebar {

    width: 320px;

    min-width: 320px;

    background: var(--card);

    overflow-y: auto;

    padding: 20px;

    border-right: 1px solid #333;

    transition:
        width 0.3s ease,
        min-width 0.3s ease,
        padding 0.3s ease,
        opacity 0.3s ease;

    opacity: 1;
}

.sidebar-hidden {

    width: 0;

    min-width: 0;

    padding: 0;

    overflow: hidden;

    border-right: none;

    opacity: 0;
}

/* SEARCH */

#search {

    width: 100%;

    padding: 10px;

    margin-bottom: 15px;

    border-radius: 8px;

    border: none;

    outline: none;
}

/* FILTERS */

#filterContainer {

    margin-bottom: 20px;
}

.filter-btn {

    display: inline-block;

    background: var(--accent);

    color: white;

    padding: 8px 12px;

    margin: 5px;

    border-radius: 8px;

    cursor: pointer;

    border: none;
}

#clearFilter {

    margin-top: 10px;

    width: 100%;
}

/* FILE CARD */

.file-card {

    background: rgba(255,255,255,0.05);

    margin-top: 12px;

    padding: 12px;

    border-radius: 10px;

    cursor: pointer;

    transition: 0.2s;
}

.file-card:hover {

    transform: scale(1.02);
}

/* MAIN */

#main {

    flex: 1;

    overflow-y: auto;

    position: relative;

    transition: all 0.3s ease;
}

/* TOPBAR */

#topbar {

    position: sticky;

    top: 0;

    background: var(--card);

    padding: 12px 20px;

    display: flex;

    gap: 10px;

    z-index: 100;

    border-bottom: 1px solid #333;
}

/* BUTTON */

button {

    background: var(--accent);

    color: white;

    border: none;

    padding: 10px 15px;

    border-radius: 8px;

    cursor: pointer;
}

/* PROGRESS BAR */

#progress-container {

    position: fixed;

    top: 0;
    left: 0;

    width: 100%;

    height: 4px;

    z-index: 9999;
}

#progress-bar {

    height: 100%;

    width: 0%;

    background: var(--accent);
}

/* CONTENT */

#content {

    max-width: 1000px;

    margin: auto;

    padding: 40px;

    line-height: 1.8;
}

pre {

    padding: 15px;

    overflow-x: auto;

    border-radius: 10px;
}

img {

    max-width: 100%;
}

#downloadPDFBtn {

    display: none;
}

</style>

</head>

<body>

<!-- PROGRESS BAR -->

<div id="progress-container">
    <div id="progress-bar"></div>
</div>

<!-- SIDEBAR -->

<div id="sidebar">

    <h2>Essay Library</h2>

    <input
        type="text"
        id="search"
        placeholder="Search essays..."
    >

    <div id="filterContainer"></div>

    <div id="fileList"></div>

</div>

<!-- MAIN -->

<div id="main">

    <!-- TOPBAR -->

    <div id="topbar">

        <button onclick="toggleSidebar()">
            ☰ Sidebar
        </button>

        <button onclick="toggleTheme()">
            Toggle Theme
        </button>

        <button id="downloadPDFBtn">
            Download PDF
        </button>

    </div>

    <!-- CONTENT -->

    <div id="content">

        <h1>Welcome</h1>

        <p>Select an essay from the sidebar.</p>

    </div>

</div>

<script>

/* =========================================
   CONFIG
========================================= */

const repoUser = "RoshanatNiser";

const repoName = "Essays";

const branch = "main";

const folder = "essays";

const pdfFolder = "pdfs";

/* =========================================
   GLOBALS
========================================= */

let markdownFiles = [];

let filters = {};

let currentFilter = null;

let currentFile = null;

/* =========================================
   FETCH MARKDOWN FILES
========================================= */

async function fetchMarkdownFiles() {

    const apiURL =
`https://api.github.com/repos/${repoUser}/${repoName}/contents/${folder}`;

    const response = await fetch(apiURL);

    const data = await response.json();

    markdownFiles = data.filter(file =>
        file.name.endsWith(".md")
    );

    renderFileList(markdownFiles);
}

/* =========================================
   FETCH FILTERS
========================================= */

async function fetchFilters() {

    try {

        const response =
            await fetch("filters.json");

        filters = await response.json();

        renderFilters();

    } catch(error) {

        console.log("No filters.json found");
    }
}

/* =========================================
   RENDER FILTERS
========================================= */

function renderFilters() {

    const container =
        document.getElementById("filterContainer");

    container.innerHTML = "";

    const filterNames =
        Object.keys(filters);

    if(filterNames.length === 0) return;

    filterNames.forEach(filterName => {

        const button =
            document.createElement("button");

        button.className = "filter-btn";

        button.innerText = filterName;

        button.onclick = () =>
            applyFilter(filterName);

        container.appendChild(button);
    });

    const clearButton =
        document.createElement("button");

    clearButton.id = "clearFilter";

    clearButton.innerText = "Remove Filter";

    clearButton.onclick = clearFilter;

    container.appendChild(clearButton);
}

/* =========================================
   APPLY FILTER
========================================= */

function applyFilter(filterName) {

    currentFilter = filterName;

    const allowedFiles =
        filters[filterName];

    const filtered =
        markdownFiles.filter(file =>
            allowedFiles.includes(file.name)
        );

    renderFileList(filtered);
}

/* =========================================
   CLEAR FILTER
========================================= */

function clearFilter() {

    currentFilter = null;

    renderFileList(markdownFiles);
}

/* =========================================
   RENDER FILE LIST
========================================= */

function renderFileList(files) {

    const fileList =
        document.getElementById("fileList");

    fileList.innerHTML = "";

    files.forEach(file => {

        const div =
            document.createElement("div");

        div.className = "file-card";

        div.innerHTML =
            `<strong>${file.name.replace(".md","")}</strong>`;

        div.onclick = () =>
            loadMarkdown(file.name);

        fileList.appendChild(div);
    });
}

/* =========================================
   LOAD MARKDOWN
========================================= */

async function loadMarkdown(filename) {

    currentFile = filename;

    const rawURL =
`https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/${folder}/${filename}`;

    const response = await fetch(rawURL);

    const markdown = await response.text();

    document.getElementById("content").innerHTML =
        marked.parse(markdown);

    hljs.highlightAll();

    MathJax.typeset();

    document.getElementById("main")
        .scrollTo(0,0);

    checkPDFExists(filename);
}

/* =========================================
   CHECK PDF EXISTS
========================================= */

async function checkPDFExists(filename) {

    const pdfFile =
        filename.replace(".md",".pdf");

    const pdfURL =
`https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/${pdfFolder}/${pdfFile}`;

    try {

        const response =
            await fetch(pdfURL, {
                method: "HEAD"
            });

        if(response.ok) {

            const button =
                document.getElementById("downloadPDFBtn");

            button.style.display = "inline-block";

            button.onclick = () => {

                window.open(pdfURL, "_blank");
            };

        } else {

            document.getElementById("downloadPDFBtn")
                .style.display = "none";
        }

    } catch(error) {

        document.getElementById("downloadPDFBtn")
            .style.display = "none";
    }
}

/* =========================================
   SEARCH
========================================= */

document.getElementById("search")
.addEventListener("input", function() {

    const value =
        this.value.toLowerCase();

    let filesToSearch =
        markdownFiles;

    if(currentFilter) {

        const allowedFiles =
            filters[currentFilter];

        filesToSearch =
            markdownFiles.filter(file =>
                allowedFiles.includes(file.name)
            );
    }

    const filtered =
        filesToSearch.filter(file =>
            file.name.toLowerCase().includes(value)
        );

    renderFileList(filtered);
});

/* =========================================
   TOGGLE SIDEBAR
========================================= */

function toggleSidebar() {

    const sidebar =
        document.getElementById("sidebar");

    sidebar.classList.toggle("sidebar-hidden");
}

/* =========================================
   DARK / LIGHT MODE
========================================= */

function toggleTheme() {

    document.body.classList.toggle("light");
}

/* =========================================
   READING PROGRESS BAR
========================================= */

document.getElementById("main")
.addEventListener("scroll", () => {

    let winScroll =
        document.getElementById("main").scrollTop;

    let height =
        document.getElementById("main").scrollHeight -
        document.getElementById("main").clientHeight;

    let scrolled =
        (winScroll / height) * 100;

    document.getElementById("progress-bar")
        .style.width = scrolled + "%";
});

/* =========================================
   START
========================================= */

fetchMarkdownFiles();

fetchFilters();

</script>

</body>

</html>
