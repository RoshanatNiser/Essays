<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essay Viewer</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            padding: 40px;
        }

        #content {
            max-width: 900px;
            margin: auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            line-height: 1.8;
        }

        h1, h2, h3 {
            color: #4da6ff;
        }

        code {
            background: #333;
            padding: 2px 5px;
            border-radius: 4px;
        }

        pre {
            background: #222;
            padding: 15px;
            overflow-x: auto;
            border-radius: 8px;
        }

        a {
            color: #66ccff;
        }
    </style>
</head>
<body>

<div id="content">Loading...</div>

<script>

const repoUser = "YOUR_USERNAME";
const repoName = "YOUR_REPO_NAME";
const branch = "main";

const params = new URLSearchParams(window.location.search);
const file = params.get("file");

const rawURL =
`https://raw.githubusercontent.com/${repoUser}/${repoName}/${branch}/essays/${file}`;

fetch(rawURL)
    .then(response => response.text())
    .then(markdown => {
        document.getElementById("content").innerHTML =
            marked.parse(markdown);
    })
    .catch(error => {
        document.getElementById("content").innerHTML =
            "<h2>Error loading file.</h2>";
        console.error(error);
    });

</script>

</body>
</html>
